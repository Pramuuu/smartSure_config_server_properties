# ===============================
# APPLICATION
# ===============================
server.port=8082
spring.application.name=policyservice

# ===============================
# DATABASE
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smartsure_policy_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASS}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# ===============================
# CONNECTION POOL
# ===============================
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

# ===============================
# SECURITY
# ===============================
internal.secret=${INTERNAL_SECRET}

# ===============================
# REDIS
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.cache.type=redis

# ===============================
# RABBITMQ
# ===============================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USERNAME:smartsure}
spring.rabbitmq.password=${RABBITMQ_PASSWORD:smartsure}
spring.rabbitmq.virtual-host=/

spring.rabbitmq.listener.simple.retry.enabled=true
spring.rabbitmq.listener.simple.retry.initial-interval=3000
spring.rabbitmq.listener.simple.retry.max-attempts=3
spring.rabbitmq.listener.simple.retry.multiplier=2.0
spring.rabbitmq.listener.simple.retry.max-interval=10000
spring.rabbitmq.listener.simple.acknowledge-mode=auto

# ===============================
# EMAIL
# ===============================
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

notification.from-email=${MAIL_USERNAME}

# ===============================
# CORS
# ===============================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# ===============================
# FEIGN / SERVICE URL
# ===============================
services.auth-service.url=http://localhost:8081

# ===============================
# RESILIENCE4J - CIRCUIT BREAKER
# ===============================
resilience4j.circuitbreaker.instances.authService.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.authService.sliding-window-size=10
resilience4j.circuitbreaker.instances.authService.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authService.wait-duration-in-open-state=30s

resilience4j.circuitbreaker.instances.notificationService.sliding-window-size=5
resilience4j.circuitbreaker.instances.notificationService.failure-rate-threshold=60

# ===============================
# RETRY
# ===============================
resilience4j.retry.instances.authService.max-attempts=3
resilience4j.retry.instances.authService.wait-duration=1s

resilience4j.retry.instances.notificationService.max-attempts=2
resilience4j.retry.instances.notificationService.wait-duration=2s

# ===============================
# RATE LIMITER
# ===============================
resilience4j.ratelimiter.instances.policyPurchase.limit-for-period=10
resilience4j.ratelimiter.instances.policyPurchase.limit-refresh-period=1s

# ===============================
# OBSERVABILITY
# ===============================
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.1}
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans

management.endpoints.web.exposure.include=health,info,metrics,prometheus,circuitbreakers
management.endpoint.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}

# ===============================
# LOKI
# ===============================
loki.url=${LOKI_URL:http://localhost:3100}
