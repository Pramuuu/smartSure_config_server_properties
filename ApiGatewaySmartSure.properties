# ===============================
# APPLICATION INFO
# ===============================
spring.application.name=ApiGatewaySmartSure
server.port=8080

# ===============================
# EUREKA
# ===============================
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=localhost
spring.cloud.gateway.server.webflux.discovery.locator.enabled=false
spring.cloud.gateway.server.webflux.discovery.locator.lower-case-service-id=true

# ===============================
# JWT CONFIG (NO HARDCODE)
# ===============================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# INTERNAL SECURITY
# ===============================
internal.secret=${INTERNAL_SECRET}

# ===============================
# CORS
# ===============================
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:4200}

# ===============================
# FEATURE 1: REDIS — Rate Limiting
# ===============================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}


spring.cloud.gateway.filter.request-rate-limiter.deny-empty-key=false
# ===============================
# GATEWAY ROUTES WITH RATE LIMITING AND CIRCUIT BREAKER
# ===============================

# --- Route 0: AuthService /user/** ---
spring.cloud.gateway.server.webflux.routes[0].id=authServiceUser
spring.cloud.gateway.server.webflux.routes[0].uri=lb://authservice
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/user/**
spring.cloud.gateway.server.webflux.routes[0].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.redis-rate-limiter=#{@customerRateLimiter}
spring.cloud.gateway.server.webflux.routes[0].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[0].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.name=authServiceCB
spring.cloud.gateway.server.webflux.routes[0].filters[1].args.fallbackUri=forward:/fallback/auth

# --- Route 1: AuthService /api/auth/** ---
spring.cloud.gateway.server.webflux.routes[1].id=authServiceApi
spring.cloud.gateway.server.webflux.routes[1].uri=lb://authservice
spring.cloud.gateway.server.webflux.routes[1].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.server.webflux.routes[1].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.redis-rate-limiter=#{@authRateLimiter}
spring.cloud.gateway.server.webflux.routes[1].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[1].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.name=authServiceCB
spring.cloud.gateway.server.webflux.routes[1].filters[1].args.fallbackUri=forward:/fallback/auth

# --- Route 2: PolicyService /api/policies/** ---
spring.cloud.gateway.server.webflux.routes[2].id=policyServicePolicies
spring.cloud.gateway.server.webflux.routes[2].uri=lb://policyservice
spring.cloud.gateway.server.webflux.routes[2].predicates[0]=Path=/api/policies/**
spring.cloud.gateway.server.webflux.routes[2].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.redis-rate-limiter=#{@customerRateLimiter}
spring.cloud.gateway.server.webflux.routes[2].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[2].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.name=policyServiceCB
spring.cloud.gateway.server.webflux.routes[2].filters[1].args.fallbackUri=forward:/fallback/policy

# --- Route 3: PolicyService /api/policy-types/** ---
spring.cloud.gateway.server.webflux.routes[3].id=policyServiceTypes
spring.cloud.gateway.server.webflux.routes[3].uri=lb://policyservice
spring.cloud.gateway.server.webflux.routes[3].predicates[0]=Path=/api/policy-types/**
spring.cloud.gateway.server.webflux.routes[3].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.redis-rate-limiter=#{@customerRateLimiter}
spring.cloud.gateway.server.webflux.routes[3].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[3].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[3].filters[1].args.name=policyServiceCB
spring.cloud.gateway.server.webflux.routes[3].filters[1].args.fallbackUri=forward:/fallback/policy

# --- Route 4: ClaimService /api/claims/** ---
spring.cloud.gateway.server.webflux.routes[4].id=claimService
spring.cloud.gateway.server.webflux.routes[4].uri=lb://claimservice
spring.cloud.gateway.server.webflux.routes[4].predicates[0]=Path=/api/claims/**
spring.cloud.gateway.server.webflux.routes[4].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.redis-rate-limiter=#{@customerRateLimiter}
spring.cloud.gateway.server.webflux.routes[4].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[4].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[4].filters[1].args.name=claimServiceCB
spring.cloud.gateway.server.webflux.routes[4].filters[1].args.fallbackUri=forward:/fallback/claim

# --- Route 5: AdminService /api/admin/** ---
spring.cloud.gateway.server.webflux.routes[5].id=adminService
spring.cloud.gateway.server.webflux.routes[5].uri=lb://adminservice
spring.cloud.gateway.server.webflux.routes[5].predicates[0]=Path=/api/admin/**
spring.cloud.gateway.server.webflux.routes[5].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[5].filters[0].args.redis-rate-limiter=#{@adminRateLimiter}
spring.cloud.gateway.server.webflux.routes[5].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[5].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[5].filters[1].args.name=adminServiceCB
spring.cloud.gateway.server.webflux.routes[5].filters[1].args.fallbackUri=forward:/fallback/admin

# --- Route 6: PaymentService /api/payments/** ---
spring.cloud.gateway.server.webflux.routes[6].id=paymentService
spring.cloud.gateway.server.webflux.routes[6].uri=lb://paymentservice
spring.cloud.gateway.server.webflux.routes[6].predicates[0]=Path=/api/payments/**
spring.cloud.gateway.server.webflux.routes[6].filters[0].name=RequestRateLimiter
spring.cloud.gateway.server.webflux.routes[6].filters[0].args.redis-rate-limiter=#{@customerRateLimiter}
spring.cloud.gateway.server.webflux.routes[6].filters[0].args.key-resolver=#{@userKeyResolver}
spring.cloud.gateway.server.webflux.routes[6].filters[1].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[6].filters[1].args.name=paymentServiceCB
spring.cloud.gateway.server.webflux.routes[6].filters[1].args.fallbackUri=forward:/fallback/payment

# --- Route 7: AuthService internal /user/internal/** ---
spring.cloud.gateway.server.webflux.routes[7].id=authServiceInternal
spring.cloud.gateway.server.webflux.routes[7].uri=lb://authservice
spring.cloud.gateway.server.webflux.routes[7].predicates[0]=Path=/user/internal/**
spring.cloud.gateway.server.webflux.routes[7].filters[0].name=CircuitBreaker
spring.cloud.gateway.server.webflux.routes[7].filters[0].args.name=authServiceCB
spring.cloud.gateway.server.webflux.routes[7].filters[0].args.fallbackUri=forward:/fallback/auth

# ===============================
# FEATURE 4: RESILIENCE4J CIRCUIT BREAKER CONFIG
# ===============================

# AuthService
resilience4j.circuitbreaker.instances.authServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.authServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.authServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.authServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.authServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.authServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.authServiceCB.timeout-duration=5s

# PolicyService
resilience4j.circuitbreaker.instances.policyServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.policyServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.policyServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.policyServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.policyServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.policyServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.policyServiceCB.timeout-duration=5s

# ClaimService
resilience4j.circuitbreaker.instances.claimServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.claimServiceCB.sliding-window-size=10
resilience4j.circuitbreaker.instances.claimServiceCB.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.claimServiceCB.wait-duration-in-open-state=30s
resilience4j.circuitbreaker.instances.claimServiceCB.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.claimServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.claimServiceCB.timeout-duration=8s

# AdminService — stricter thresholds
resilience4j.circuitbreaker.instances.adminServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.adminServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.adminServiceCB.failure-rate-threshold=40
resilience4j.circuitbreaker.instances.adminServiceCB.wait-duration-in-open-state=20s
resilience4j.circuitbreaker.instances.adminServiceCB.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.adminServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.adminServiceCB.timeout-duration=5s

# PaymentService — strictest (money involved)
resilience4j.circuitbreaker.instances.paymentServiceCB.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.instances.paymentServiceCB.sliding-window-size=5
resilience4j.circuitbreaker.instances.paymentServiceCB.failure-rate-threshold=30
resilience4j.circuitbreaker.instances.paymentServiceCB.wait-duration-in-open-state=60s
resilience4j.circuitbreaker.instances.paymentServiceCB.permitted-number-of-calls-in-half-open-state=2
resilience4j.circuitbreaker.instances.paymentServiceCB.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.timelimiter.instances.paymentServiceCB.timeout-duration=10s

# ===============================
# LOGGING
# ===============================
logging.level.org.springframework.cloud.gateway=WARN
logging.level.org.springframework.security=WARN
logging.level.com.smartSure.ApiGatewaySmartSure=INFO

# ===============================
# TRACING (ZIPKIN)
# ===============================
management.tracing.sampling.probability=${TRACING_SAMPLE_RATE:0.1}
management.zipkin.tracing.endpoint=${ZIPKIN_URL:http://localhost:9411}/api/v2/spans
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]

# ===============================
# PROMETHEUS
# ===============================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,gateway,circuitbreakers
management.endpoint.prometheus.access=unrestricted
management.endpoint.health.show-details=always
management.health.circuitbreakers.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# ===============================
# LOKI
# ===============================
loki.url=${LOKI_URL:http://localhost:3100}
